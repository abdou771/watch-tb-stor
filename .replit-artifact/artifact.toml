kind = "web"
previewPath = "/"
title = "Watch TB"
version = "1.0.0"
id = "artifacts/watch-tb"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21204

[services.development]
run = "pnpm --filter @workspace/watch-tb run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/watch-tb", "run", "build" ]
publicDir = "artifacts/watch-tb/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21204"
BASE_PATH = "/"
